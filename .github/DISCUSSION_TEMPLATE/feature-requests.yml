body:
  - type: markdown
    attributes:
      value: |
        Thank you for getting in touch! Please fill out this form as completely as possible.

        Want to report a bug instead? Use our [bug report form](https://github.com/miichom/xpath2css/issues/new?template=01-bug-report.yml)
  - type: input
    id: package-version
    attributes:
      label: What version of `@miichom/xpath2css` are you using?
      placeholder: 0.0.0
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What is your idea?
      description: A brief, one or two sentence description of your idea for a new feature.
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Why is this feature necessary?
      description: Explain why this feature is important. What problems could it solve? Which users would it help?
    validations:
      required: true
  - type: textarea
    id: prior-art
    attributes:
      label: Do you have an example of this feature in other projects?
      description: Help us understand your idea by sharing links to example implementations we can compare against.
      placeholder: |
        - Some example
        - Another example
  - type: checkboxes
    id: will-pr
    attributes:
      label: Participation
      description: Let us know if your interested in contributing this feature yourself.
      options:
        - label: I am willing to submit a pull request for this feature.
          required: false