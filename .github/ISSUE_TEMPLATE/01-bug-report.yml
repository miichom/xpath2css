name: "🐛 Bug Report"
description: Report a bug or unexpected behaviour
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to fill out this bug report! Please fill out this form as completely as possible.
  - type: input
    id: package-version
    attributes:
      label: What version of `@miichom/xpath2css` are you using?
      placeholder: 0.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: What environment are you using?
      placeholder: node, bun, deno, or webworker
    validations:
      required: true
  - type: input
    id: package-manager
    attributes:
      label: If you chose node, what package manager are you using?
      placeholder: npm, yarn, pnpm
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: bug-repoduction
    attributes:
      label: Link to minimal reproduction
      description: 'Use [codepen.io](https://codepen.io) to create OR link to a repository with a minimal repoduction of the problem. **A minimal repoduction is required** so that the maintainers can help debug your issue. If a report is vague (e.g., just a generic error message) and has no repoduction, it may be auto-closed.'
      placeholder: https://github.com/octocat/Spoon-Knife
  - type: checkboxes
    id: will-pr
    attributes:
      label: Participation
      options:
        - label: I am willing to submit a pull request for this issue.
          required: false


